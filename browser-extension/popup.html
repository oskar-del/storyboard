<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storyboard Capture</title>
<style>
  :root {
    --bg: #0e0e14;
    --surface: #16161f;
    --surface2: #1c1c28;
    --border: rgba(255,255,255,0.09);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f5;
    --muted: #7a7a9a;
    --muted2: #9a9ab8;
    --accent: #7c6bff;
    --green: #56cfaa;
    --orange: #f97316;
    --yellow: #ffd166;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 340px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    font-size: 13px;
    line-height: 1.5;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    display: flex; align-items: center; gap: 7px;
    font-weight: 800; font-size: 14px; letter-spacing: -0.3px;
  }
  .logo-hex { color: var(--accent); font-size: 16px; }
  .server-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #334; border: 1px solid #445;
    transition: background 0.3s;
  }
  .server-dot.live { background: var(--green); border-color: var(--green); box-shadow: 0 0 6px var(--green); }
  .server-dot.dead { background: var(--orange); border-color: var(--orange); }
  .server-status { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 5px; }

  /* Source info */
  .source-bar {
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .source-icon { font-size: 16px; flex-shrink: 0; }
  .source-info { flex: 1; min-width: 0; }
  .source-tool { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  .source-title {
    font-size: 12px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 240px;
  }

  /* Form */
  .form { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

  .field label {
    display: block; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em;
    color: var(--muted); margin-bottom: 5px;
  }

  .type-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  }
  .type-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 4px;
    text-align: center; cursor: pointer;
    transition: all .15s; color: var(--muted2);
    font-size: 11px; font-weight: 600;
  }
  .type-btn .tb-icon { font-size: 16px; display: block; margin-bottom: 2px; }
  .type-btn.selected { border-color: var(--accent); background: rgba(124,107,255,0.12); color: var(--text); }
  .type-btn:hover:not(.selected) { border-color: var(--border2); color: var(--text); }

  input, textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
    resize: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  select { appearance: none; cursor: pointer; }
  select option { background: #1c1c28; }

  .preview-toggle {
    font-size: 10px; font-weight: 700; color: var(--muted);
    cursor: pointer; text-transform: uppercase; letter-spacing: .06em;
    display: flex; align-items: center; gap: 4px;
    border: none; background: none; padding: 0;
  }
  .preview-toggle:hover { color: var(--muted2); }
  .preview-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
    font-size: 11px; color: var(--muted2); line-height: 1.55;
    max-height: 100px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-word;
  }

  .capture-btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: 9px; padding: 11px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    letter-spacing: -0.2px;
    transition: all .15s;
    width: 100%; margin-top: 2px;
  }
  .capture-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .capture-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* States */
  .success-state, .error-state { display: none; padding: 20px 14px; text-align: center; }
  .success-state { color: var(--green); }
  .success-state .s-icon { font-size: 36px; margin-bottom: 10px; }
  .error-state { color: var(--orange); }
  .error-state .e-icon { font-size: 32px; margin-bottom: 8px; }
  .state-msg { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .state-sub { font-size: 11px; color: var(--muted2); line-height: 1.5; }
  .retry-btn {
    margin-top: 12px; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 7px; padding: 7px 14px; color: var(--text);
    font-size: 12px; font-weight: 600; cursor: pointer;
  }

  .footer {
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    font-size: 10px; color: var(--muted);
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer a { color: var(--muted); text-decoration: none; }
  .footer a:hover { color: var(--muted2); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <span class="logo-hex">⬡</span>
    Storyboard
  </div>
  <div class="server-status">
    <div class="server-dot" id="serverDot"></div>
    <span id="serverLabel">Checking…</span>
  </div>
</div>

<!-- Source bar -->
<div class="source-bar" id="sourceBar" style="display:none">
  <span class="source-icon" id="sourceIcon">🤖</span>
  <div class="source-info">
    <div class="source-tool" id="sourceTool">—</div>
    <div class="source-title" id="sourceTitle">—</div>
  </div>
</div>

<!-- Main form -->
<div class="form" id="mainForm">

  <!-- Block type -->
  <div class="field">
    <label>Block type</label>
    <div class="type-grid" id="typeGrid">
      <div class="type-btn selected" data-type="session" onclick="selectType(this)">
        <span class="tb-icon">🧠</span>Session
      </div>
      <div class="type-btn" data-type="decision" onclick="selectType(this)">
        <span class="tb-icon">✓</span>Decision
      </div>
      <div class="type-btn" data-type="idea" onclick="selectType(this)">
        <span class="tb-icon">💡</span>Idea
      </div>
      <div class="type-btn" data-type="feature" onclick="selectType(this)">
        <span class="tb-icon">🔧</span>Feature
      </div>
    </div>
  </div>

  <!-- Title -->
  <div class="field">
    <label>Title</label>
    <input type="text" id="titleInput" placeholder="What was this session about?" maxlength="120">
  </div>

  <!-- Project -->
  <div class="field">
    <label>Project</label>
    <select id="projectSelect">
      <option value="">Select project…</option>
    </select>
  </div>

  <!-- Notes (optional) -->
  <div class="field">
    <label>Notes <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
    <textarea id="notesInput" rows="2" placeholder="Key decisions, context, or what to do next…"></textarea>
  </div>

  <!-- Context preview toggle -->
  <div style="display:flex;align-items:center;justify-content:space-between">
    <button class="preview-toggle" id="previewToggle" onclick="togglePreview()">
      <span id="previewArrow">▸</span> Include page context
    </button>
    <label style="font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer">
      <input type="checkbox" id="includeContext" checked style="width:auto;border-radius:3px;padding:0;accent-color:#7c6bff">
      attach
    </label>
  </div>
  <div class="preview-box" id="contextPreview" style="display:none">Loading context…</div>

  <button class="capture-btn" id="captureBtn" onclick="doCapture()">
    ⚡ Capture to Storyboard
  </button>
</div>

<!-- Success state -->
<div class="success-state" id="successState">
  <div class="s-icon">✓</div>
  <div class="state-msg" id="successMsg">Captured!</div>
  <div class="state-sub" id="successSub">Block added to your storyboard.</div>
  <button class="retry-btn" onclick="resetForm()">Capture another</button>
</div>

<!-- Error state -->
<div class="error-state" id="errorState">
  <div class="e-icon">⚠️</div>
  <div class="state-msg">Couldn't reach Storyboard</div>
  <div class="state-sub">Make sure the MCP server is running:<br><code style="font-family:monospace;font-size:11px;color:var(--muted2)">node mcp-server.js</code></div>
  <button class="retry-btn" onclick="resetForm()">Try again</button>
</div>

<!-- Footer -->
<div class="footer">
  <span>⬡ Storyboard v0.1</span>
  <a href="http://localhost:3848" target="_blank">Open dashboard ↗</a>
</div>

<script src="popup.js"></script>
</body>
</html>
